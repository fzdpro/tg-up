name: Upload File

on:
  push:
    paths:
      - "uploads/**"
      - "voice-settings/**"

permissions:
  contents: write

jobs:

  send:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4


      - name: Wait for voice settings

        run: |

          echo "Waiting for voice settings..."

          sleep 15

          git fetch origin main

          git reset --hard origin/main

          echo "Latest repository state loaded"

          echo "Uploads:"

          ls -la uploads || true

          echo "Voice settings:"

          ls -la voice-settings || true


      - name: Install FFmpeg

        run: |

          sudo apt-get update

          sudo apt-get install -y ffmpeg


      - name: Extract Covers

        run: |

          mkdir -p covers

          for file in uploads/*.mp3; do

            [ -e "$file" ] || continue

            filename=$(basename "$file" .mp3)

            cover="covers/${filename}.jpg"

            echo "Extracting cover from: $file"

            ffmpeg -y \
              -i "$file" \
              -an \
              -map 0:v:0 \
              -c:v mjpeg \
              "$cover" 2>/dev/null || true

          done


      - name: Install Python Libraries

        run: |

          pip install requests mutagen


      - name: Send files to Telegram

        env:

          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

          CHAT_ID: ${{ secrets.CHAT_ID }}

        run: |

          cat > send.py << 'PY'

          import os
          import glob
          import subprocess
          import requests
          import json

          from mutagen.easyid3 import EasyID3
          from mutagen import File


          token = os.environ["BOT_TOKEN"]

          chat_id = os.environ["CHAT_ID"]


          audio_url = (
              f"https://api.telegram.org/"
              f"bot{token}/sendAudio"
          )


          voice_url = (
              f"https://api.telegram.org/"
              f"bot{token}/sendVoice"
          )


          def time_to_seconds(time_string):

              minutes, seconds, milliseconds = map(
                  int,
                  time_string.split(":")
              )

              return (
                  minutes * 60
                  + seconds
                  + milliseconds / 1000
              )


          # ==================================================
          # SEND MP3 FILES
          # ==================================================


          for file in glob.glob(
              "uploads/*.mp3"
          ):


              filename = os.path.splitext(
                  os.path.basename(file)
              )[0]


              cover = (
                  f"covers/"
                  f"{filename}.jpg"
              )


              metadata_file = (
                  f"voice-settings/"
                  f"{filename}.json"
              )


              voice_enabled = False

              voice_start = "00:00:000"

              voice_duration = ""


              # ------------------------------------------
              # LOAD VOICE SETTINGS
              # ------------------------------------------


              if os.path.exists(
                  metadata_file
              ):

                  try:

                      with open(
                          metadata_file,
                          "r",
                          encoding="utf-8"
                      ) as metadata:

                          config = json.load(
                              metadata
                          )


                      print(
                          f"Loaded voice settings: "
                          f"{config}"
                      )


                      voice_enabled = bool(
                          config.get(
                              "enabled",
                              False
                          )
                      )


                      voice_start = (
                          config.get(
                              "start",
                              "00:00:000"
                          )
                          or
                          "00:00:000"
                      )


                      voice_duration = (
                          config.get(
                              "duration",
                              ""
                          )
                          or
                          ""
                      )


                  except Exception as e:

                      print(
                          f"Could not read metadata: {e}"
                      )

              else:

                  print(
                      f"No voice settings found: "
                      f"{metadata_file}"
                  )


              print(
                  f"Voice enabled: "
                  f"{voice_enabled}"
              )


              print(
                  f"Voice start: "
                  f"{voice_start}"
              )


              print(
                  f"Voice duration: "
                  f"{voice_duration}"
              )


              # ------------------------------------------
              # READ MP3 TAGS
              # ------------------------------------------


              try:

                  tags = EasyID3(file)


                  artist = tags.get(
                      "artist",
                      ["Unknown Artist"]
                  )[0]


                  title = tags.get(
                      "title",
                      [filename]
                  )[0]


              except Exception as e:

                  print(
                      f"Could not read tags: {e}"
                  )


                  artist = (
                      "Unknown Artist"
                  )


                  title = filename


              audio_info = File(file)


              if (

                  audio_info
                  and
                  audio_info.info

              ):

                  duration = int(
                      audio_info.info.length
                  )

              else:

                  duration = 0


              # ==================================================
              # 1. SEND ORIGINAL MP3
              # ==================================================


              data = {

                  "chat_id": chat_id,

                  "title": title,

                  "performer": artist,

                  "duration": duration,

                  "caption": "@TRTOPMUSIC"

              }


              audio = open(
                  file,
                  "rb"
              )


              files = {

                  "audio": audio

              }


              cover_file = None


              if os.path.exists(
                  cover
              ):

                  cover_file = open(
                      cover,
                      "rb"
                  )


                  files["thumbnail"] = (
                      cover_file
                  )


              try:

                  response = requests.post(

                      audio_url,

                      data=data,

                      files=files

                  )


                  print(
                      response.text
                  )


                  result = (
                      response.json()
                  )


                  if not result.get(
                      "ok"
                  ):

                      raise Exception(

                          "Telegram error: "
                          +
                          response.text

                      )


                  print(

                      f"MP3 sent successfully: "
                      f"{file}"

                  )


              finally:

                  audio.close()


                  if cover_file:

                      cover_file.close()


              # ==================================================
              # 2. CREATE AND SEND VOICE
              # ==================================================


              if voice_enabled:

                  print(
                      "Voice upload is ENABLED"
                  )


                  try:

                      voice_duration_seconds = (
                          float(
                              voice_duration
                          )
                      )


                  except Exception:

                      print(
                          "Invalid voice duration"
                      )

                      voice_duration_seconds = 0


                  if voice_duration_seconds <= 0:

                      print(
                          "Voice skipped: "
                          "invalid duration"
                      )

                  else:

                      start_seconds = (
                          time_to_seconds(
                              voice_start
                          )
                      )


                      voice_file = (
                          f"/tmp/"
                          f"{filename}_voice.ogg"
                      )


                      print(
                          f"Creating voice: "
                          f"{voice_file}"
                      )


                      fade_start = max(
                          voice_duration_seconds - 2,
                          0
                      )


                      ffmpeg_command = [

                          "ffmpeg",

                          "-y",

                          "-ss",

                          str(start_seconds),

                          "-i",

                          file,

                          "-t",

                          str(
                              voice_duration_seconds
                          ),

                          "-vn",

                          "-af",

                          (

                              f"afade="
                              f"t=out:"
                              f"st={fade_start}:"
                              f"d=2"

                          ),

                          "-c:a",

                          "libopus",

                          "-b:a",

                          "128k",

                          "-application",

                          "audio",

                          voice_file

                      ]


                      print(
                          "Running FFmpeg..."
                      )


                      subprocess.run(

                          ffmpeg_command,

                          check=True

                      )


                      print(
                          "Voice file created"
                      )


                      voice = open(

                          voice_file,

                          "rb"

                      )


                      voice_files = {

                          "voice": voice

                      }


                      voice_data = {

                          "chat_id": chat_id,

                          "caption": artist

                      }


                      try:

                          response = requests.post(

                              voice_url,

                              data=voice_data,

                              files=voice_files

                          )


                          print(
                              response.text
                          )


                          result = (
                              response.json()
                          )


                          if not result.get(
                              "ok"
                          ):

                              raise Exception(

                                  "Telegram error: "
                                  +
                                  response.text

                              )


                          print(

                              f"Voice sent successfully: "
                              f"{voice_file}"

                          )


                      finally:

                          voice.close()


                          if os.path.exists(
                              voice_file
                          ):

                              os.remove(
                                  voice_file
                              )


              else:

                  print(

                      "Voice disabled. "
                      "Skipping voice upload."

                  )


              # ==================================================
              # REMOVE MP3, COVER AND SETTINGS
              # ==================================================


              os.remove(
                  file
              )


              if os.path.exists(
                  cover
              ):

                  os.remove(
                      cover
                  )


              if os.path.exists(
                  metadata_file
              ):

                  os.remove(
                      metadata_file
                  )


          # ==================================================
          # SEND MANUALLY UPLOADED OGG FILES
          # ==================================================


          for file in glob.glob(

              "uploads/*.ogg"

          ):


              filename = os.path.splitext(

                  os.path.basename(file)

              )[0]


              print(

                  f"Sending voice: {file}"

              )


              print(

                  f"Caption: {filename}"

              )


              voice = open(

                  file,

                  "rb"

              )


              files = {

                  "voice": voice

              }


              data = {

                  "chat_id": chat_id,

                  "caption": filename

              }


              try:

                  response = requests.post(

                      voice_url,

                      data=data,

                      files=files

                  )


                  print(

                      response.text

                  )


                  result = response.json()


                  if result.get(
                      "ok"
                  ):

                      print(

                          f"Voice sent successfully: "
                          f"{file}"

                      )


                      os.remove(
                          file
                      )

                  else:

                      raise Exception(

                          "Telegram error: "
                          +
                          response.text

                      )


              finally:

                  voice.close()


          PY


          python send.py


      - name: Delete sent files from repository

        run: |

          git config user.name \
            "github-actions[bot]"


          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"


          git add -A


          git commit \
            -m "Remove processed files" \
            || exit 0


          git push
