name: Upload File

on:
  push:
    paths:
      - "uploads/**"

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Extract Covers
        run: |
          mkdir -p covers

          for file in uploads/*.mp3; do
            [ -e "$file" ] || continue

            filename=$(basename "$file" .mp3)
            cover="covers/${filename}.jpg"

            echo "Extracting cover from: $file"

            ffmpeg -y \
              -i "$file" \
              -an \
              -map 0:v:0 \
              -c:v mjpeg \
              "$cover" 2>/dev/null || true
          done

      - name: Install Python Requests
        run: |
          pip install requests

      - name: Send files to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          cat > send.py << 'PY'
          import os
          import glob
          import requests

          token = os.environ["BOT_TOKEN"]
          chat_id = os.environ["CHAT_ID"]

          url = f"https://api.telegram.org/bot{token}/sendAudio"

          for file in glob.glob("uploads/*.mp3"):

              filename = os.path.splitext(
                  os.path.basename(file)
              )[0]

              cover = f"covers/{filename}.jpg"

              data = {
                  "chat_id": chat_id,
                  "caption": "@TRTOPMUSIC"
              }

              audio = open(file, "rb")

              files = {
                  "audio": audio
              }

              cover_file = None

              if os.path.exists(cover):
                  cover_file = open(cover, "rb")
                  files["thumbnail"] = cover_file

              try:
                  response = requests.post(
                      url,
                      data=data,
                      files=files
                  )

                  print(response.text)

                  result = response.json()

                  if result.get("ok"):
                      print(f"Sent successfully: {file}")

                      os.remove(file)

                      if os.path.exists(cover):
                          os.remove(cover)

                  else:
                      raise Exception(
                          f"Telegram error: {response.text}"
                      )

              finally:
                  audio.close()

                  if cover_file:
                      cover_file.close()
          PY

          python send.py

      - name: Delete sent files from repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          git commit -m "Remove processed files" || exit 0

          git push
